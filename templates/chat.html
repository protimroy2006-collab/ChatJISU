<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATJISU - AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="chat-page">

    <div class="sidebar chat-sidebar">
        <div>
            <a href="/" class="sidebar-brand-link">
                <div class="sidebar-brand"><i class="fa-solid fa-graduation-cap"></i> CHATJISU</div>
            </a>
            <div class="sidebar-menu">
                <div class="menu-item active"><i class="fa-solid fa-compass"></i> Assistant Desk</div>
                <div class="menu-item"><i class="fa-solid fa-file-signature"></i> Admissions</div>
                <div class="menu-item"><i class="fa-regular fa-calendar-check"></i> Schedules</div>
            </div>
        </div>
        <div class="status-indicator">
            <div class="status-dot orange-glow"></div> Online
        </div>
    </div>

    <div class="main-chat-window">
        <div class="app-header dark-header">
            <h1>JISU Intelligence</h1>
            <div class="header-info orange-text"><i class="fa-solid fa-bolt"></i> AI Powered</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-row bot-row">
                <div class="bot-avatar orange-bg"><i class="fa-solid fa-robot"></i></div>
                <div class="message bot-message">
                    Welcome! I am CHATJISU. How can I help you explore JIS University today?
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="quick-replies dark-quick-replies">
            <button class="quick-reply-btn orange-border" onclick="sendQuickReply('Admissions')">Admissions</button>
            <button class="quick-reply-btn orange-border" onclick="sendQuickReply('Fee Structure')">Fee Structure</button>
            <button class="quick-reply-btn orange-border" onclick="sendQuickReply('Campus Life')">Campus Life</button>
        </div>

        <div class="input-wrapper dark-input">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask your question here..." onkeypress="handleKeyPress(event)" autocomplete="off">
                <button onclick="sendMessage()" class="orange-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
