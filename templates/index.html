<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATJIS - Professional JIS University Assistant</title>
    <!-- Linking our separated production stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Platform Application Sidebar Menu -->
    <div class="sidebar">
        <div>
            <div class="sidebar-brand">CHATJIS</div>
            <div class="sidebar-menu">
                <div class="menu-item active">🏫 University Guide</div>
                <div class="menu-item">📝 Admissions</div>
                <div class="menu-item">📅 Schedules</div>
                <div class="menu-item">🌟 Campus Life</div>
            </div>
        </div>
        <div class="menu-item" style="border-top: 1px solid rgba(72, 202, 228, 0.2); border-radius: 0; padding-top: 18px; margin: 0 -16px; padding-left: 16px; padding-right: 16px;">
            Status: Online
        </div>
    </div>

    <!-- Active Main Application Window Dashboard -->
    <div class="main-chat-window">
        <div class="app-header">
            <h1>JIS University Assistant</h1>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-row bot-row">
                <div class="message bot-message">
                    👋 Welcome to CHATJIS! I'm your personal JIS University assistant. Ask me about admissions, campus life, exam schedules, or anything else about the university!
                </div>
            </div>
            <!-- Bouncing Dots Interface Marker -->
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask anything about JIS University..." onkeypress="handleKeyPress(event)" autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Linking our separated production JavaScript mechanics engine -->
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
